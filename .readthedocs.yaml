# .readthedocs.yaml

version: 2

build:
  os: ubuntu-24.04

  tools:
    python: "3.12"

  jobs:
    post_create_environment:
      - git clone https://github.com/flutter/flutter.git --depth 1 flutter
      - ./flutter/bin/flutter --version
      - ./flutter/bin/flutter pub get

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - requirements: docs/requirements.txt