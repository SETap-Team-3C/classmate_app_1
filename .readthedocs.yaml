# .readthedocs.yaml

version: 2

build:
  os: ubuntu-24.04

  tools:
    python: "3.12"

  jobs:
    post_create_environment:
      # Install Flutter SDK
      - git clone https://github.com/flutter/flutter.git --depth 1

      # Add Flutter to PATH
      - export PATH="$READTHEDOCS_PROJECT_PATH/flutter/bin:$PATH"

      # Verify Flutter installation
      - flutter --version

      # Install project dependencies
      - flutter pub get

      # Generate Dart API docs
      - dart doc

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - requirements: docs/requirements.txt